    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --accent: #c0392b;
        --glass-bg: rgba(255,255,255,0.055);
        --glass-bg-hover: rgba(255,255,255,0.085);
        --glass-bg-active: rgba(255,255,255,0.11);
        --glass-border: rgba(255,255,255,0.11);
        --glass-border-strong: rgba(255,255,255,0.18);
        --glass-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
        --text-primary: #f2ede5;
        --text-secondary: rgba(242,237,229,0.6);
        --text-muted: rgba(242,237,229,0.3);
        --blur: blur(24px);
        --radius-sm: 10px;
        --radius-md: 16px;
        --radius-lg: 22px;
        --sidebar-w: 300px;
        --header-h: 68px;
        --font: 'Outfit', sans-serif;

        /* ✏️ MAX WIDTH — change this to widen/narrow on large screens */
        --max-content-w: 1320px;

        /* ✏️ HERO HEIGHT — change this to make the banner taller/shorter */
        --hero-h: 420px;
        --hero-h-mobile: 260px;
      }

      html, body {
        height: 100%;
        font-family: var(--font);
        color: var(--text-primary);
        overflow: hidden;
        scroll-behavior: smooth;
      }

      body {
        background: linear-gradient(135deg, #0d0205 0%, #1e0508 35%, #2a0a0d 60%, #0d0205 100%);
        background-attachment: fixed;
      }

      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      body::after {
        content: '';
        position: fixed;
        top: -20%; left: 50%; transform: translateX(-50%);
        width: 80vw; height: 60vh;
        background: radial-gradient(ellipse, rgba(160,30,20,0.18) 0%, transparent 70%);
        pointer-events: none; z-index: 0;
      }

      /* ── PAGE SHELL ── */
      .page {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        height: 100vh;
      }

      /* ── CENTERED CONTENT WRAPPER ── */
      .page-inner {
        max-width: var(--max-content-w);
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        border-left: 1px solid var(--glass-border);
        border-right: 1px solid var(--glass-border);
      }

      /* ── HEADER ── */
      header {
        height: var(--header-h);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px;
        background: rgba(0,0,0,0.35);
        border-bottom: 1px solid var(--glass-border);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        flex-shrink: 0;
        gap: 16px;
      }

      .header-left { display: flex; align-items: center; gap: 14px; }

      .header-logo {
        width: 38px; height: 38px; border-radius: 50%;
        background: var(--glass-bg-active);
        border: 1px solid var(--glass-border-strong);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 16px; color: var(--text-primary);
        overflow: hidden; flex-shrink: 0;
      }
      .header-logo img { width: 100%; height: 100%; object-fit: cover; }

      .header-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px; letter-spacing: 0.1em;
        color: var(--text-primary); line-height: 1;
      }

      .header-season {
        font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--text-muted); margin-top: 3px;
      }

      .header-right { display: flex; align-items: center; gap: 10px; }

      .player-count-badge {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 5px 14px;
        font-size: 11px; font-weight: 500;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-secondary);
      }

      .menu-toggle {
        display: none;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        padding: 8px 10px; cursor: pointer;
        align-items: center; justify-content: center;
      }

      /* ── LAYOUT ── */
      .layout { display: flex; flex: 1; overflow: hidden; }

      /* ── SIDEBAR ── */
      .sidebar {
        width: var(--sidebar-w); flex-shrink: 0;
        display: flex; flex-direction: column;
        border-right: 1px solid var(--glass-border);
        background: rgba(0,0,0,0.2);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        overflow: hidden;
        transition: transform 0.3s ease;
      }

      .sidebar-search {
        padding: 14px 14px 10px;
        border-bottom: 1px solid var(--glass-border);
        flex-shrink: 0;
      }

      .search-input-wrap { position: relative; display: flex; align-items: center; }

      .search-icon {
        position: absolute; left: 11px;
        color: var(--text-muted); pointer-events: none; flex-shrink: 0;
      }

      .search-input {
        width: 100%;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        padding: 9px 12px 9px 34px;
        font-family: var(--font); font-size: 13px;
        color: var(--text-primary);
        outline: none; transition: border-color 0.2s, background 0.2s;
      }
      .search-input::placeholder { color: var(--text-muted); }
      .search-input:focus { border-color: var(--glass-border-strong); background: var(--glass-bg-hover); }

      .roster-list {
        flex: 1; overflow-y: auto; 
        padding: 10px 10px 120px 10px; /* Increased bottom padding */
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.1) transparent;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
      .roster-list::-webkit-scrollbar { width: 4px; }
      .roster-list::-webkit-scrollbar-track { background: transparent; }
      .roster-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

      .roster-card {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 12px;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 0.18s, border-color 0.18s;
        border: 1px solid transparent;
        margin-bottom: 4px; user-select: none;
      }
      .roster-card:hover { background: var(--glass-bg); border-color: var(--glass-border); }
      .roster-card.active {
        background: var(--glass-bg-active);
        border-color: var(--glass-border-strong);
        box-shadow: 0 2px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      }

      .roster-avatar {
        width: 46px; height: 46px; border-radius: 50%;
        background: var(--glass-bg-active);
        border: 1.5px solid var(--glass-border-strong);
        overflow: hidden; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 15px; color: var(--text-secondary);
      }
      .roster-card.active .roster-avatar {
        border-color: rgba(192,57,43,0.7);
        box-shadow: 0 0 0 2px rgba(192,57,43,0.2);
      }
      .roster-avatar img { width: 100%; height: 100%; object-fit: cover; }

      .roster-info { flex: 1; min-width: 0; }
      .roster-name {
        font-size: 14px; font-weight: 500; color: var(--text-primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .roster-pos { font-size: 11px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.04em; }
      .roster-number {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px; color: var(--text-muted);
        letter-spacing: 0.05em; flex-shrink: 0; transition: color 0.18s;
      }
      .roster-card.active .roster-number { color: rgba(192,57,43,0.9); }

      /* ── DETAIL ── */
      .detail {
        flex: 1; overflow-y: auto; 
        padding: 20px 20px 120px 20px; /* Increased bottom padding */
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.08) transparent;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
      .detail::-webkit-scrollbar { width: 4px; }
      .detail::-webkit-scrollbar-track { background: transparent; }
      .detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

      .empty-state {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100%; color: var(--text-muted);
        text-align: center; gap: 12px;
      }
      .empty-state-icon {
        width: 64px; height: 64px; border-radius: 50%;
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center;
      }
      .empty-state-text { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; }

      /* ── HERO & CAROUSEL ── */
      .hero {
        position: relative;
        border-radius: var(--radius-lg);
        overflow: hidden;
        margin-bottom: 16px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
      }

      .hero-carousel {
        position: relative;
        width: 100%;
        height: var(--hero-h); 
        overflow: hidden;
        background: linear-gradient(160deg, rgba(192,57,43,0.18) 0%, rgba(0,0,0,0.6) 100%);
      }

      .hero-carousel-slide {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0;
        z-index: 1;
        transition: opacity 0.8s ease-in-out;
      }

      .hero-carousel-slide.active {
        opacity: 0.75;
        z-index: 2;
      }

      .hero-action-placeholder {
        height: var(--hero-h);
        background: linear-gradient(160deg, rgba(192,57,43,0.18) 0%, rgba(0,0,0,0.6) 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .hero-action-placeholder svg { opacity: 0.12; }

      .hero-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.45) 40%, transparent 100%);
        padding: 28px 26px 26px;
        display: flex; align-items: flex-end; gap: 18px;
        z-index: 3;
      }

      .hero-headshot {
        width: 96px; height: 116px;
        border-radius: 14px;
        background: rgba(0,0,0,0.5);
        border: 1.5px solid var(--glass-border-strong);
        overflow: hidden; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      }
      .hero-headshot img { width: 100%; height: 100%; object-fit: cover; }
      .hero-headshot-initials {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px; color: var(--text-muted);
      }

      .hero-info { flex: 1; min-width: 0; }
      .hero-number {
        display: inline-block;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--glass-border-strong);
        border-radius: 8px;
        padding: 2px 12px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px; letter-spacing: 0.06em;
        color: var(--text-secondary); margin-bottom: 7px;
        backdrop-filter: blur(8px);
      }
      .hero-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(26px, 3.5vw, 42px);
        letter-spacing: 0.06em; line-height: 1.0;
        color: var(--text-primary); margin-bottom: 12px;
      }
      .hero-social { display: flex; gap: 8px; }
      .social-btn {
        width: 32px; height: 32px;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--glass-border-strong);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-secondary); text-decoration: none;
        transition: background 0.2s, color 0.2s;
        backdrop-filter: blur(8px);
      }
      .social-btn:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }

      /* ── INFO STRIP ── */
      .info-strip {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        box-shadow: var(--glass-shadow);
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        margin-bottom: 16px;
        overflow: hidden;
      }

      .info-cell {
        padding: 14px 16px;
        border-right: 1px solid var(--glass-border);
      }
      .info-cell:last-child { border-right: none; }

      .info-label {
        font-size: 9px; font-weight: 600; letter-spacing: 0.15em;
        text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px;
      }
      .info-val { font-size: 13px; font-weight: 500; color: var(--text-primary); }

      /* ── GLASS PANEL ── */
      .glass-panel {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        box-shadow: var(--glass-shadow);
        overflow: hidden;
      }

      /* ── TABS ── */
      .tab-nav {
        display: flex; gap: 4px;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        padding: 5px; margin-bottom: 14px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .tab-btn {
        flex: 1; padding: 10px 0;
        background: transparent; border: none; border-radius: var(--radius-sm);
        color: rgba(242,237,229,0.42);
        font-family: var(--font); font-size: 12px;
        font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
        cursor: pointer; transition: all 0.22s ease;
        display: flex; align-items: center; justify-content: center; gap: 7px;
      }
      .tab-btn svg { opacity: 0.5; transition: opacity 0.22s; }
      .tab-btn:hover { color: rgba(242,237,229,0.8); background: rgba(255,255,255,0.05); }
      .tab-btn:hover svg { opacity: 0.85; }
      .tab-btn.active {
        background: rgba(255,255,255,0.11); color: var(--text-primary);
        box-shadow: 0 2px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
      }
      .tab-btn.active svg { opacity: 1; }

      .tab-panel { display: none; }
      .tab-panel.active { display: block; animation: fadeUp 0.28s ease; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }

      /* Bio */
      .bio-text { padding: 16px 18px 20px; }
      .bio-block { margin-bottom: 16px; }
      .bio-block:last-child { margin-bottom: 0; }
      .bio-block-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--text-primary); margin-bottom: 6px;
      }
      .bio-block-text {
        font-size: 13px; font-weight: 300; line-height: 1.8;
        color: var(--text-secondary);
      }

      /* Stats */
      .stats-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 18px 14px;
      }
      .stats-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px; letter-spacing: 0.08em;
      }
      .season-badge {
        background: rgba(255,255,255,0.07);
        border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 3px 12px;
        font-size: 11px; font-weight: 500;
        letter-spacing: 0.06em; color: var(--text-secondary);
      }
      .stats-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
      .stats-tbl thead th {
        text-align: left; padding: 0 12px 10px;
        font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--text-muted);
        border-bottom: 1px solid var(--glass-border);
      }
      .stats-tbl thead th:nth-child(2),
      .stats-tbl tbody td:nth-child(2) { text-align: center; }
      .stats-tbl tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.14s; }
      .stats-tbl tbody tr:last-child { border-bottom: none; }
      .stats-tbl tbody tr:hover { background: rgba(255,255,255,0.04); }
      .stats-tbl tbody td { padding: 9px 12px; color: var(--text-secondary); }
      .stats-tbl tbody td:first-child { color: var(--text-primary); }
      .stat-chip {
        display: inline-flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--glass-border);
        border-radius: 6px; min-width: 32px;
        padding: 2px 8px; font-weight: 600;
        font-size: 12px; color: var(--text-primary);
      }
      .stats-tbl .opp-link { color: var(--text-muted); font-size: 11px; text-decoration: none; }
      .stats-tbl .opp-link:hover { color: var(--text-primary); }

      /* Media */
      .media-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 10px; padding: 18px;
      }
      .media-item {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm); overflow: hidden;
        transition: background 0.18s, border-color 0.18s;
      }
      .media-item:hover { background: rgba(255,255,255,0.07); border-color: var(--glass-border-strong); }
      .media-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
      .media-iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
      .media-cap { padding: 7px 11px 9px; font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; }
      .media-empty {
        grid-column: 1/-1; text-align: center; padding: 52px 0;
        color: var(--text-muted); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 1024px) {
        :root { --sidebar-w: 260px; }
      }

      @media (max-width: 768px) {
        :root { --header-h: 60px; }

        body { overflow: auto; }
        html, body { height: auto; }

        .page { height: auto; overflow: visible; padding-bottom: 80px; /* Increased mobile page bottom padding */ }
        .page-inner { border-left: none; border-right: none; overflow: visible; }

        .layout { flex-direction: column; overflow: visible; }

        .sidebar {
          width: 100%; border-right: none;
          border-bottom: 1px solid var(--glass-border);
          max-height: 0; overflow: hidden;
          transition: max-height 0.35s ease;
        }
        .sidebar.open { max-height: 420px; }
        .roster-list { max-height: 360px; padding: 10px; } /* Reset padding for internal mobile scroll */

        .detail { overflow: visible; padding: 14px 14px 120px 14px; /* Increased mobile bottom padding */ }
        .menu-toggle { display: flex; }
        .header-title { font-size: 17px; }

        .hero-carousel,
        .hero-action-placeholder { height: var(--hero-h-mobile); }

        .hero-overlay { padding: 16px 18px 18px; gap: 14px; }
        .hero-headshot { width: 72px; height: 88px; }
        .hero-name { font-size: 24px; }

        .info-strip { grid-template-columns: repeat(3, 1fr); }
        .info-cell:nth-child(3n) { border-right: none; }
        .info-cell:nth-child(n+4) { border-top: 1px solid var(--glass-border); }
      }

      @media (max-width: 480px) {
        .info-strip { grid-template-columns: repeat(2, 1fr); }
        .info-cell { border-right: 1px solid var(--glass-border) !important; border-top: none !important; }
        .info-cell:nth-child(2n) { border-right: none !important; }
        .info-cell:nth-child(n+3) { border-top: 1px solid var(--glass-border) !important; }

        .stats-tbl thead th:nth-child(3),
        .stats-tbl tbody td:nth-child(3) { display: none; }
      }
    </style>
  </head>
  <body>

    <div class="page">
      <div class="page-inner">

        <header id="main-header">
          <div class="header-left">
            <div class="header-logo" id="header-logo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="rgba(242,237,229,0.4)" stroke-width="1.5"/>
                <path d="M12 2C12 2 8 6 8 12s4 10 4 10" stroke="rgba(242,237,229,0.4)" stroke-width="1.5"/>
                <path d="M12 2c0 0 4 4 4 10s-4 10-4 10" stroke="rgba(242,237,229,0.4)" stroke-width="1.5"/>
                <path d="M2 12h20" stroke="rgba(242,237,229,0.4)" stroke-width="1.5"/>
              </svg>
            </div>
            <div>
              <div class="header-title" id="header-title"></div>
              <div class="header-season" id="header-season"></div>
            </div>
          </div>
          <div class="header-right">
            <div class="player-count-badge" id="player-count"></div>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle roster list">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="layout">
          <aside class="sidebar" id="sidebar">
            <div class="sidebar-search">
              <div class="search-input-wrap">
                <span class="search-icon">
                  <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3" stroke-linecap="round"/>
                  </svg>
                </span>
                <input class="search-input" id="search-input" type="text" placeholder="Search players…">
              </div>
            </div>
            <div class="roster-list" id="roster-list"></div>
          </aside>

          <main class="detail" id="detail-panel">
            <div class="empty-state" id="empty-state">
              <div class="empty-state-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(242,237,229,0.25)" stroke-width="1.5">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="empty-state-text">Select a player to view profile</div>
            </div>
            <div id="player-detail" style="display:none"></div>
          </main>
        </div>

      </div></div>

    <script>
      (function () {
        var C = ROSTER_CONFIG;
        var activePlayer = null;
        var carouselInterval = null;

        function esc(s) {
          return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function initials(name) {
          return name.split(' ').slice(0,2).map(function(w){ return w[0]; }).join('').toUpperCase();
        }

        var icons = {
          bio:       '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 13c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
          stats:     '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="6.5" y="5" width="3" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="3" height="12" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>',
          media:     '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 6.5l4 1.5-4 1.5v-3z" fill="currentColor"/></svg>',
          x:         '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.254 5.622 5.91-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
          ig:        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>',
          influencer:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>',
        };

        /* Apply config */
        document.body.style.background = C.background;
        document.getElementById('header-title').textContent = C.teamName;
        document.getElementById('header-season').textContent = C.season + ' Roster';
        document.getElementById('player-count').textContent = C.players.length + ' Players';
        document.documentElement.style.setProperty('--accent', C.accent);

        var logoEl = document.getElementById('header-logo');
        if (C.teamLogo) logoEl.innerHTML = '<img src="' + esc(C.teamLogo) + '" alt="Logo">';

        /* Build sidebar */
        function buildRoster(players) {
          var list = document.getElementById('roster-list');
          list.innerHTML = '';
          players.forEach(function(p) {
            var card = document.createElement('div');
            card.className = 'roster-card' + (activePlayer && activePlayer.number === p.number ? ' active' : '');
            card.dataset.number = p.number;
            var avatarHtml = p.photo ? '<img src="' + esc(p.photo) + '" alt="' + esc(p.name) + '">' : esc(initials(p.name));
            card.innerHTML =
              '<div class="roster-avatar">' + avatarHtml + '</div>' +
              '<div class="roster-info"><div class="roster-name">' + esc(p.name) + '</div>' +
              '<div class="roster-pos">#' + esc(p.number) + ' · ' + esc(p.position) + '</div></div>' +
              '<div class="roster-number">' + esc(p.number) + '</div>';
            card.addEventListener('click', function() {
              selectPlayer(p);
              if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            });
            list.appendChild(card);
          });
        }

        /* Search */
        document.getElementById('search-input').addEventListener('input', function() {
          var q = this.value.toLowerCase();
          buildRoster(C.players.filter(function(p) {
            return p.name.toLowerCase().includes(q) || p.position.toLowerCase().includes(q) || p.number.includes(q);
          }));
        });

        /* Mobile toggle */
        document.getElementById('menu-toggle').addEventListener('click', function() {
          document.getElementById('sidebar').classList.toggle('open');
        });

        /* Select player */
        function selectPlayer(p) {
          activePlayer = p;
          document.querySelectorAll('.roster-card').forEach(function(c) {
            c.classList.toggle('active', c.dataset.number === p.number);
          });
          document.getElementById('empty-state').style.display = 'none';
          
          var panel = document.getElementById('player-detail');
          panel.style.display = 'block';
          panel.innerHTML = renderDetail(p);
          
          panel.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              panel.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
              panel.querySelectorAll('.tab-panel').forEach(function(tp) { tp.classList.remove('active'); });
              btn.classList.add('active');
              panel.querySelector('#tp-' + btn.dataset.tab).classList.add('active');
            });
          });
          
          // Smooth scroll top on new player selection
          document.getElementById('detail-panel').scrollTo({ top: 0, behavior: 'smooth' });

          // Carousel Interval Logic
          if (carouselInterval) clearInterval(carouselInterval);
          var slides = panel.querySelectorAll('.hero-carousel-slide');
          if (slides.length > 1) {
            var currentSlide = 0;
            carouselInterval = setInterval(function() {
              slides[currentSlide].classList.remove('active');
              currentSlide = (currentSlide + 1) % slides.length;
              slides[currentSlide].classList.add('active');
            }, 4000);
          }
        }

        function renderDetail(p) {
          /* Hero Media */
          var actionContent = '';
          if (p.actionMedia && p.actionMedia.length > 0) {
            actionContent = '<div class="hero-carousel">';
            p.actionMedia.forEach(function(media, idx) {
              var activeClass = idx === 0 ? ' active' : '';
              if (media.type === 'video') {
                actionContent += '<video class="hero-carousel-slide' + activeClass + '" src="' + esc(media.url) + '" autoplay muted loop playsinline></video>';
              } else {
                actionContent += '<img class="hero-carousel-slide' + activeClass + '" src="' + esc(media.url) + '" alt="' + esc(p.name) + '">';
              }
            });
            actionContent += '</div>';
          } else {
            actionContent = '<div class="hero-action-placeholder"><svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="rgba(242,237,229,0.25)" stroke-width="0.75"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg></div>';
          }

          var headshotContent = p.photo
            ? '<img src="' + esc(p.photo) + '" alt="' + esc(p.name) + '">'
            : '<div class="hero-headshot-initials">' + esc(initials(p.name)) + '</div>';

          var socialHtml = '';
          if (p.social.twitter)    socialHtml += '<a class="social-btn" href="' + esc(p.social.twitter)    + '" target="_blank" rel="noopener">' + icons.x         + '</a>';
          if (p.social.instagram)  socialHtml += '<a class="social-btn" href="' + esc(p.social.instagram)  + '" target="_blank" rel="noopener">' + icons.ig         + '</a>';
          if (p.social.influencer) socialHtml += '<a class="social-btn" href="' + esc(p.social.influencer) + '" target="_blank" rel="noopener">' + icons.influencer + '</a>';

          var hero = '<div class="hero">' + actionContent +
            '<div class="hero-overlay">' +
              '<div class="hero-headshot">' + headshotContent + '</div>' +
              '<div class="hero-info">' +
                '<div class="hero-number">' + esc(p.number) + '</div>' +
                '<div class="hero-name">' + esc(p.name.toUpperCase()) + '</div>' +
                (socialHtml ? '<div class="hero-social">' + socialHtml + '</div>' : '') +
              '</div>' +
            '</div></div>';

          /* Info strip */
          var strip = '<div class="info-strip">' +
            '<div class="info-cell"><div class="info-label">Position</div><div class="info-val">'   + esc(p.position)  + '</div></div>' +
            '<div class="info-cell"><div class="info-label">Height</div><div class="info-val">'     + esc(p.height)    + '</div></div>' +
            '<div class="info-cell"><div class="info-label">Weight</div><div class="info-val">'     + esc(p.weight)    + '</div></div>' +
            '<div class="info-cell"><div class="info-label">Class</div><div class="info-val">'      + esc(p.classYear) + '</div></div>' +
            '<div class="info-cell"><div class="info-label">Hometown</div><div class="info-val">'   + esc(p.hometown)  + '</div></div>' +
            '<div class="info-cell"><div class="info-label">High School</div><div class="info-val">'+ esc(p.highSchool)+ '</div></div>' +
          '</div>';

          /* Tab nav */
          var nav = '<div class="tab-nav">' +
            ['bio','stats','media'].map(function(t){
              return '<button class="tab-btn' + (t==='bio'?' active':'') + '" data-tab="' + t + '">' +
                icons[t] + t.charAt(0).toUpperCase() + t.slice(1) + '</button>';
            }).join('') + '</div>';

          /* Bio */
          var bioBlocks = (p.bio||[]).map(function(b){
            return '<div class="bio-block"><div class="bio-block-label">' + esc(b.label) + '</div>' +
              '<div class="bio-block-text">' + esc(b.text) + '</div></div>';
          }).join('');
          var bioPanel = '<div class="tab-panel glass-panel active" id="tp-bio"><div class="bio-text">' + bioBlocks + '</div></div>';

          /* Stats */
          var statsRows = (p.stats||[]).map(function(s){
            var opp = s.opponentUrl
              ? '<a class="opp-link" href="' + esc(s.opponentUrl) + '" target="_blank">' + esc(s.opponent) + '</a>'
              : '<span class="opp-link" style="cursor:default">' + esc(s.opponent) + '</span>';
            return '<tr><td>' + esc(s.category) + '</td><td><span class="stat-chip">' + esc(s.value) + '</span></td><td>' + esc(s.date) + '</td><td>' + opp + '</td></tr>';
          }).join('');
          var statsPanel = '<div class="tab-panel glass-panel" id="tp-stats">' +
            '<div class="stats-head"><div class="stats-title">Season Highs</div><div class="season-badge">' + esc(C.season) + '</div></div>' +
            '<table class="stats-tbl"><thead><tr><th>Category</th><th>Value</th><th>Date</th><th>Opponent</th></tr></thead>' +
            '<tbody>' + statsRows + '</tbody></table></div>';

          /* Media */
          var mediaContent = (!p.media || p.media.length === 0)
            ? '<div class="media-empty">No media available yet</div>'
            : p.media.map(function(m){
                var inner = m.type==='video'
                  ? '<iframe class="media-iframe" src="' + esc(m.url) + '" allowfullscreen></iframe>'
                  : '<img class="media-img" src="' + esc(m.url) + '" alt="' + esc(m.caption||'') + '" loading="lazy">';
                return '<div class="media-item">' + inner + (m.caption ? '<div class="media-cap">' + esc(m.caption) + '</div>' : '') + '</div>';
              }).join('');
          var mediaPanel = '<div class="tab-panel glass-panel" id="tp-media"><div class="media-grid">' + mediaContent + '</div></div>';

          return hero + strip + nav + bioPanel + statsPanel + mediaPanel;
        }

        buildRoster(C.players);
        if (window.innerWidth > 768 && C.players.length > 0) selectPlayer(C.players[0]);
      })();
    </script>

  </body>
</html>
